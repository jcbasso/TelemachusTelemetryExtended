openapi: 3.1.0
info:
  title: TelemachusTelemetryExtended API
  version: 1.2.0
  description: |
    Logical API specification for TelemachusTelemetryExtended endpoints.

    Runtime transport is Telemachus datalink (`/telemachus/datalink`) where values are requested
    as query aliases (`alias=extended.*`).
    Complex `extended.*` payloads are returned as direct objects/arrays in datalink responses.
servers:
  - url: http://127.0.0.1:8085
    description: Local Telemachus default server
tags:
  - name: Contracts
  - name: Science
  - name: Plugins
  - name: Vessels
paths:
  /extended/contracts/accepted:
    get:
      tags: [Contracts]
      operationId: listAcceptedContracts
      summary: Get accepted contracts
      x-telemachus-datalink:
        key: extended.contracts.accepted
        exampleQuery: /telemachus/datalink?cAccepted=extended.contracts.accepted
      responses:
        '200':
          description: Accepted contracts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Contract'

  /extended/contracts/accepted/{index}:
    get:
      tags: [Contracts]
      operationId: getAcceptedContractByIndex
      summary: Get accepted contract by index
      x-telemachus-datalink:
        key: extended.contracts.accepted[index]
        exampleQuery: /telemachus/datalink?cAccepted0=extended.contracts.accepted[0]
      parameters:
        - $ref: '#/components/parameters/IndexPath'
      responses:
        '200':
          description: Accepted contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contract'

  /extended/contracts/byState:
    get:
      tags: [Contracts]
      operationId: getContractsByState
      summary: Get all current contracts grouped by state
      x-telemachus-datalink:
        key: extended.contracts.byState
        exampleQuery: /telemachus/datalink?cByState=extended.contracts.byState
      responses:
        '200':
          description: Contracts grouped by state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractsByState'

  /extended/science/current:
    get:
      tags: [Science]
      operationId: getScienceCurrent
      summary: Get current xScience filtered list
      description: Mirrors `[x] Science!` current filtered checklist when available.
      x-telemachus-datalink:
        key: extended.science.current
        exampleQuery: /telemachus/datalink?sCurrent=extended.science.current
      responses:
        '200':
          description: Current science payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScienceListPayload'
              example:
                available: true
                items:
                  - id: crewReport@KerbinSrfLandedLaunchPad
                    description: Crew Report while landed at Kerbin's LaunchPad (Shores)
                    shortDescription: Crew Report
                    experimentSituation: SrfLanded
                    situationDescription: landed at Kerbin's LaunchPad (Shores)
                    body: Kerbin
                    biome: Shores
                    subBiome: LaunchPad
                    completedScience: 0
                    totalScience: 1.5
                    progress: 0
                    isComplete: false
                    isUnlocked: true
                    isCollected: false
                    onboardScience: 0
                    rerunnable: true

  /extended/science/global:
    get:
      tags: [Science]
      operationId: getScienceGlobal
      summary: Get full xScience global list
      description: Registered through Telemachus global plugin scope, so it can be queried outside flight scenes.
      x-telemachus-datalink:
        key: extended.science.global
        exampleQuery: /telemachus/datalink?sGlobal=extended.science.global
      responses:
        '200':
          description: Global science payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScienceListPayload'

  /extended/plugins/registered:
    get:
      tags: [Plugins]
      operationId: getRegisteredPlugins
      summary: Get plugins registered in Telemachus plugin registry
      x-telemachus-datalink:
        key: extended.plugins.registered
        exampleQuery: /telemachus/datalink?plugins=extended.plugins.registered
      responses:
        '200':
          description: Registered Telemachus plugin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegisteredPlugin'

  /extended/plugins/loaded:
    get:
      tags: [Plugins]
      operationId: getLoadedPluginAssemblies
      summary: Get all loaded assemblies from KSP runtime
      x-telemachus-datalink:
        key: extended.plugins.loaded
        exampleQuery: /telemachus/datalink?loaded=extended.plugins.loaded
      responses:
        '200':
          description: Loaded assemblies list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoadedAssembly'

  /extended/vessels/orbits:
    get:
      tags: [Vessels]
      operationId: getVesselsOrbits
      summary: Get all vessels orbit dataset
      description: Global-scoped endpoint for client-side multi-vessel orbital rendering.
      x-telemachus-datalink:
        key: extended.vessels.orbits
        exampleQuery: /telemachus/datalink?vessels=extended.vessels.orbits
      responses:
        '200':
          description: All-vessels orbit payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VesselsOrbitsPayload'

components:
  parameters:
    IndexPath:
      name: index
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
      description: Zero-based index.

  schemas:
    RegisteredPlugin:
      type: object
      required: [typeName, assembly, assemblyVersion, origin, commands]
      properties:
        typeName:
          type: string
        assembly:
          type: string
        assemblyVersion:
          type: string
        origin:
          type: string
          enum: [internal, external]
        commands:
          type: array
          items:
            type: string

    LoadedAssembly:
      type: object
      required: [name, version, fullName, location]
      properties:
        name:
          type: string
        version:
          type: string
        fullName:
          type: string
        location:
          type: string

    ContractParameter:
      type: object
      required: [id, title, notes, state, optional]
      properties:
        id:
          type: string
        title:
          type: string
        notes:
          type: string
        state:
          type: string
        optional:
          type: boolean

    Contract:
      type: object
      required:
        - id
        - guid
        - title
        - synopsys
        - notes
        - state
        - localizedState
        - prestige
        - dateAccepted
        - dateDeadline
        - parameters
      properties:
        id:
          type: integer
          format: int64
        guid:
          type: string
        title:
          type: string
        synopsys:
          type: string
        notes:
          type: string
        state:
          type: string
        localizedState:
          type: string
        prestige:
          type: string
        dateAccepted:
          type: number
        dateDeadline:
          type: number
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/ContractParameter'

    ContractsByState:
      type: object
      required:
        - generated
        - offered
        - offerExpired
        - declined
        - cancelled
        - active
        - completed
        - deadlineExpired
        - failed
        - withdrawn
        - other
      properties:
        generated:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        offered:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        offerExpired:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        declined:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        cancelled:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        active:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        completed:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        deadlineExpired:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        failed:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        withdrawn:
          type: array
          items: { $ref: '#/components/schemas/Contract' }
        other:
          type: array
          items: { $ref: '#/components/schemas/Contract' }

    ScienceItem:
      type: object
      required:
        - id
        - description
        - shortDescription
        - experimentSituation
        - situationDescription
        - body
        - biome
        - subBiome
        - completedScience
        - totalScience
        - progress
        - isComplete
        - isUnlocked
        - isCollected
        - onboardScience
        - rerunnable
      properties:
        id:
          type: string
        description:
          type: string
        shortDescription:
          type: string
        experimentSituation:
          type: string
        situationDescription:
          type: string
        body:
          type: string
        biome:
          type: string
        subBiome:
          type: string
        completedScience:
          type: number
        totalScience:
          type: number
        progress:
          type: number
        isComplete:
          type: boolean
        isUnlocked:
          type: boolean
        isCollected:
          type: boolean
        onboardScience:
          type: number
        rerunnable:
          type: boolean

    ScienceListPayload:
      type: object
      required: [available, items]
      properties:
        available:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScienceItem'

    VesselOrbit:
      type: object
      required:
        - sma
        - eccentricity
        - inclination
        - lan
        - argumentOfPeriapsis
        - trueAnomaly
        - meanAnomalyAtEpoch
        - epoch
        - period
        - ApA
        - PeA
      properties:
        sma:
          type: number
        eccentricity:
          type: number
        inclination:
          type: number
        lan:
          type: number
        argumentOfPeriapsis:
          type: number
        trueAnomaly:
          type: number
        meanAnomalyAtEpoch:
          type: number
        epoch:
          type: number
        period:
          type: number
        ApA:
          type: number
        PeA:
          type: number

    VesselOrbitItem:
      type: object
      required:
        - id
        - name
        - type
        - situation
        - isActive
        - isTarget
        - body
        - bodyRadius
        - latitude
        - longitude
        - altitude
        - orbit
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        situation:
          type: string
        isActive:
          type: boolean
        isTarget:
          type: boolean
        body:
          type: string
        bodyRadius:
          type: number
        latitude:
          type: number
        longitude:
          type: number
        altitude:
          type: number
        orbit:
          $ref: '#/components/schemas/VesselOrbit'

    VesselsOrbitsPayload:
      type: object
      required:
        - available
        - ut
        - vessels
      properties:
        available:
          type: boolean
        ut:
          type: number
        vessels:
          type: array
          items:
            $ref: '#/components/schemas/VesselOrbitItem'

